    <head>Vers l’Homo Technologicus : la science a-t-elle brisé la frontière de l‘humain ?</head>
    <body>
    
        <p>Imaginez une puce de la taille d’une pièce de monnaie, glissée sous le crâne, capable de connecter vos pensée directement à un ordinateur. Ce scénario de science fiction est devenu réalité dans certains laboratoires. Mais alors que la science progresse à pas de géant, une question cruciale s’impose : jusqu’où pouvons nous modifier nos corps sans causer la perte de notre humanité  ?</p>

        <h1>L’équilibre fragile entre soigner les imperfections et  hacker l’évolution</h1>

        <p>Depuis quelques années, la médecine accomplit des miracles technologiques pour soigner les corps humains en difficultés : les pacemakers régulent certains coeurs fatigués, les prothèses bioniques redonnent une possibilité d’atteindre de nouveau une mobilité aux amputés, les implants font retrouver le plaisir d’écouter à ceux qui l’avaient perdue. 
Jusqu’ici, la science avait pour objectif de soigner les failles de chaque configuration biologique handicapante.<br>

Si le 19e siècle a vu l’essor des technologies de communication comme le cinéma ou la télévision, un cap inédit est aujourd’hui  franchi avec les interfaces cerveau-machine.  Neuralink, une entreprise d’Elon Musk a fait grand bruit ces dernières années notamment pour son implant cérébrale surnommée M1 qui pourrait permettre de contrôler un ordinateur depuis la pensée. Trois individus sont déjà dotés de cette appareil, chez le premier 85% des électrodes se seraient déconnectés.<br> 

Neuralink n’est pas la seule à s’intéresser à la nouvelle technologie, Paradomics, baptisé Connexus est très différent de cette dernière. Plutôt que d’utiliser des fis ultra fins, toutes les électrodes sont réunies sur un petit disque. Selon le constructeur, Dr Matt Angle celui-ci contient officiellement 421 électrodes en platine et en iridium, mesurant chacune 40 micromètres. Cet attirail devrait pouvoir enregistrer l’activité cérébrale et, à terme permettre non seulement de déplacer le pointeur d’un ordinateur mais aussi de traduire certains signaux neurologiques en parole grâce à une synthèse vocale. 

      <h1>La dépouille de nos émotions imposées par les hautes technologies</h1>

      <p>Certes, ces inventions sont fascinantes mais que ferons-nous quand elles prendront le contrôle de notre corps, notre cerveau et même de notre âme ? En confiant nos pensées à un algorithme, nous risquons de perdre notre imagination, notre capacité à réfléchir mais aussi notre lenteur. Donc ce qui fait toutes nos singularités, notre personnalité. Si une machine anticipe chacun de nos gestes, chacune de nos réflexions seront-nous encore capable de réfléchir par nous même ? Et si cet implant nous empêche de réfléchir avec les sentiments d’un humain, seront nous encore maîtres de nos émotions ?<br>

Avec nos erreurs, nos hésitations, nos doutes, l’art fut créé. Ce sont ces détails qui ont engendrés la persévérance, la discipline, l’échec ainsi que la réussite mais aussi la satisfaction d’être parvenu à ses fins. Si la perfection était constante, qu’est ce qui différencierait une simple toile, une comédie commune ou un écrit banal d’un chef-d’œuvre ? D’une œuvre d’art ? Rien puisque l’homme a pris l’habitude d’être parfait et, si le reste de la population réfléchit, parle et imagine comme nous tout en atteignant la perfection; alors chaque être humain d’apparence unique ne deviendrait que la simple copie de personnalité de son camarade. C’est ce qui pourrait nous attendre si ces nouvelles technologies continuent de se développer.<br>

Et si une machine commence à faire des erreurs, s’éteint ou se fait pirater, la sécurité de nos pensées repose sur les failles d’une machine en incapacité de fonctionner. Il faut comprendre que faire reposer son état neurologique ainsi que notre santé personnelle et celle d’autrui c’est risquer la vie de nombreuses personnes. Tout cela pour un implant qui était conçu essentiellement pour améliorer et aider l’existence de chacun. Dépendre de la technologie pour faire fonctionner notre cerveau c’est comme traverser un pont les yeux bandés ; si la chance nous sourit le pont n’est pas endommagé, à l’inverse c’est ta vie qui va subir toutes ses répercussions.<br>


En fin de compte la technologie se transforme en un univers que l’on pensait tous réservée à la science fiction. Si réparer le corps reste une victoire pour la médecine, vouloir fusionner notre esprit avec la machine pousse l’homme au bord d’un précipice sans fond. La dépendance à ces nouveaux appareils pourrait bien causer la perte de l’humanité. Est ce que le prochain homo sapiens pourrait devenir l’homo technologicus ?</p>
